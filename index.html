<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farrapus Restaurante</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header id="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="assets/logo-sem-fundo.png" class="logo">

    <h1>Experiência Italiana Autêntica</h1>
    <p>Massas artesanais, vinhos selecionados e ambiente sofisticado</p>

    <div class="buttons">
      <a href="#" class="btn">Reservar Mesa</a>
      <a href="#" class="btn secondary">Ver Cardápio</a>
    </div>
  </div>
</header>

<section class="reveal">
  <h2>Destaques</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
      <h3>Lasanha Bolonhesa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">
      <h3>4 Queijos</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1525755662778-989d0524087e">
      <h3>Massas Artesanais</h3>
    </div>
  </div>
</section>

<section class="cta reveal">
  <h2>Reserve agora</h2>
  <a href="#" class="btn">WhatsApp</a>
</section>

<footer>
  <p>© Farrapus Restaurante</p>
</footer>

<script src="script.js"></script>

</body>
</html>
